<!DOCTYPE html>
<html lang="th">

<head>
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="K.C. METAL SHEET PUBLIC CO.,LTD">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <title>Stock Price - KCM</title>

  <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/templatemo-chain-app-dev.css">
  <link rel="stylesheet" href="assets/css/glass-theme.css">

  <style>
    .page-banner {
      background: linear-gradient(135deg, #1a235a 0%, #2b3990 100%);
      padding: 180px 0 100px 0;
      color: #fff;
      text-align: center;
    }

    .price-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      padding: 40px;
      margin-top: -60px;
      position: relative;
      z-index: 10;
    }

    .stock-value {
      font-size: 80px;
      font-weight: 700;
      color: #2b3990;
      line-height: 1;
      margin-bottom: 5px;
    }

    .status-up {
      color: #28a745;
      font-weight: 600;
      font-size: 20px;
    }

    .status-down {
      color: #dc3545;
      font-weight: 600;
      font-size: 20px;
    }

    .info-label {
      color: #888;
      font-size: 16px;
    }

    .info-value {
      font-weight: 600;
      color: #333;
      font-size: 18px;
    }

    .set-link-btn {
      display: inline-block;
      background: #ff581f;
      color: #fff !important;
      padding: 12px 30px;
      border-radius: 30px;
      font-weight: 600;
      transition: 0.3s;
      margin-top: 30px;
      text-decoration: none;
    }

    .set-link-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 88, 31, 0.3);
    }

    .divider-custom {
      width: 60px;
      height: 4px;
      background: #ff581f;
      margin: 15px auto;
      border-radius: 2px;
    }

    /* ปุ่มเปลี่ยนภาษา */
    .lang-switch .lang-btn {
      border: 1px solid #ddd;
      background: #fff;
      padding: 2px 8px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 2px;
    }

    .lang-switch .lang-btn.active {
      background: #2b3990;
      color: #fff;
      border-color: #2b3990;
    }
  </style>
</head>

<body>

  <div id="shared-header" data-active-main="investor" data-active-sub="stock-price"></div>

  <div class="page-banner">
    <div class="container">
      <h2 class="lang-text" data-th="ราคาหุ้น" data-en="Stock Price">ราคาหุ้น</h2>
      <div class="divider-custom"></div>
      <p class="lang-text" data-th="บริษัท เค.ซี.เมททอลชีท จำกัด (มหาชน)" data-en="K.C. METAL SHEET PUBLIC CO.,LTD">
        บริษัท เค.ซี.เมททอลชีท จำกัด (มหาชน)</p>
    </div>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="price-card">
          <div class="row align-items-center">
            <div class="col-md-6 border-end text-center">
              <h6 class="text-muted mb-2 lang-text" data-th="ราคาล่าสุด (KCM)" data-en="Last Price (KCM)">
                ราคาล่าสุด (KCM)</h6>
              <div id="last_price" class="stock-value">...</div>
              <div id="price_change" class="mt-2 lang-text" data-th="กำลังโหลด..." data-en="Loading...">
                กำลังโหลด...</div>
            </div>

            <div class="col-md-6 ps-md-5">
              <div class="row mb-2">
                <div class="col-6 info-label lang-text" data-th="เปิด:" data-en="Open:">เปิด:</div>
                <div id="open_price" class="col-6 info-value">...</div>
              </div>
              <div class="row mb-2">
                <div class="col-6 info-label lang-text" data-th="สูงสุด:" data-en="High:">สูงสุด:</div>
                <div id="high_price" class="col-6 info-value">...</div>
              </div>
              <div class="row mb-2">
                <div class="col-6 info-label lang-text" data-th="ต่ำสุด:" data-en="Low:">ต่ำสุด:</div>
                <div id="low_price" class="col-6 info-value">...</div>
              </div>
              <div class="row mb-2">
                <div class="col-6 info-label lang-text" data-th="ปริมาณการซื้อขาย:" data-en="Volume:">
                  ปริมาณการซื้อขาย:</div>
                <div id="volume" class="col-6 info-value">...</div>
              </div>
            </div>
          </div>

          <div class="text-center">
            <a href="https://www.set.or.th/th/market/product/stock/quote/KCM/price" target="_blank"
              class="set-link-btn">
              <span class="lang-text" data-th="ดูข้อมูล Real-time จาก SET"
                data-en="View Real-time Data from SET">ดูข้อมูล Real-time จาก SET</span>
              <i class="fa fa-external-link-alt ms-2"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>


  <div id="shared-footer"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

  <script>
    // เริ่มทำงานเมื่อโหลดหน้าเว็บ
    window.onload = function () {
      fetchStockData(); // โหลดข้อมูลทันที
      setInterval(fetchStockData, 60000); // อัปเดตทุก 1 นาที

      // ถ้ามีฟังก์ชันเปลี่ยนภาษา ให้เรียกใช้ตรงนี้
      // setLang('th'); 
    };

    // ฟังก์ชันดึงราคาหุ้นจาก Yahoo Finance (ผ่าน Proxy)
    async function fetchStockData() {
      const symbol = 'KCM.BK'; // รหัสหุ้นใน Yahoo
      // ใช้ Proxy เพื่อแก้ปัญหา CORS (Cross-Origin)
      const proxyUrl = 'https://api.allorigins.win/raw?url=';
      const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;

      try {
        const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));

        if (!response.ok) {
          throw new Error('Network response was not ok');
        }

        const data = await response.json();

        // เจาะข้อมูล JSON ของ Yahoo
        const result = data.chart.result[0];
        const meta = result.meta;
        const quote = result.indicators.quote[0];

        // 1. ราคาล่าสุด (Regular Market Price)
        const lastPrice = meta.regularMarketPrice;
        const prevClose = meta.chartPreviousClose;

        // 2. คำนวณการเปลี่ยนแปลง
        const change = lastPrice - prevClose;
        const changePercent = (change / prevClose) * 100;

        // 3. ข้อมูล Open, High, Low
        // ใช้ค่าจาก meta จะแม่นยำกว่าการหา min/max เองในบางจังหวะ
        const openPrice = quote.open[0] || meta.regularMarketPrice;

        // หาค่า High/Low จากอาร์เรย์ (กรองค่า null ออก)
        const validHighs = quote.high.filter(val => val != null);
        const validLows = quote.low.filter(val => val != null);
        const highPrice = validHighs.length > 0 ? Math.max(...validHighs) : lastPrice;
        const lowPrice = validLows.length > 0 ? Math.min(...validLows) : lastPrice;

        // 4. Volume (แปลงเป็นหน่วยล้าน)
        const volume = meta.regularMarketVolume;
        const volumeMillion = (volume / 1000000).toFixed(2);

        // --- นำข้อมูลไปแสดงผลที่หน้าเว็บ ---

        // แสดงราคา
        document.getElementById('last_price').innerText = lastPrice.toFixed(2);
        document.getElementById('open_price').innerText = openPrice.toFixed(2);
        document.getElementById('high_price').innerText = highPrice.toFixed(2);
        document.getElementById('low_price').innerText = lowPrice.toFixed(2);

        // แสดง Volume (เช็คภาษาปัจจุบัน ถ้าไม่มีตัวแปร currentLang ให้ default เป็นไทย)
        let volUnit = 'ล้าน';
        if (typeof currentLang !== 'undefined' && currentLang === 'en') {
          volUnit = 'M';
        }
        document.getElementById('volume').innerText = `${volumeMillion} ${volUnit}`;

        // แสดงการเปลี่ยนแปลง (สีและเครื่องหมาย)
        const changeEl = document.getElementById('price_change');

        // ล้าง Class สีเก่าออก
        changeEl.classList.remove('text-success', 'text-danger', 'text-muted');

        let icon = '';
        let sign = '';

        if (change > 0) {
          changeEl.classList.add('text-success'); // สีเขียว (ใช้ class ของ Bootstrap)
          changeEl.style.color = '#28a745'; // บังคับสีเขียว
          icon = '<i class="fas fa-caret-up"></i>';
          sign = '+';
        } else if (change < 0) {
          changeEl.classList.add('text-danger'); // สีแดง
          changeEl.style.color = '#dc3545'; // บังคับสีแดง
          icon = '<i class="fas fa-caret-down"></i>';
          sign = ''; // เลขลบมีเครื่องหมาย - อยู่แล้ว
        } else {
          changeEl.classList.add('text-muted'); // สีเทา (ราคาไม่เปลี่ยน)
          changeEl.style.color = '#6c757d';
          icon = '<i class="fas fa-minus"></i>';
          sign = '';
        }

        changeEl.innerHTML = `${icon} ${sign}${change.toFixed(2)} (${sign}${changePercent.toFixed(2)}%)`;

      } catch (error) {
        console.error('Error fetching stock data:', error);
        // กรณีโหลดไม่ได้จริงๆ ให้แสดงขีด - หรือข้อความ Error
        document.getElementById('last_price').innerText = "-";
        document.getElementById('price_change').innerText = "Data N/A";
      }
    }
  </script>


  <script src="vendor/jquery/jquery.min.js"></script>
  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/custom.js"></script>
  <script src="assets/js/language-switch.js"></script>
  <script src="assets/js/header-loader.js"></script>
  <script src="assets/js/footer-loader.js"></script>
</body>

</html>
